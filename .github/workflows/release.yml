on:
  push:
    branches:
      - main
    tags-ignore:
      - latest

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/tags/') }}

name: Release

permissions:
  contents: write
  packages: write

jobs:
  #client:
  #  uses: ./.github/workflows/client.yml
  #  secrets: inherit
  server:
    uses: ./.github/workflows/server.yml
    secrets: inherit
